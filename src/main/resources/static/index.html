<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
</head>
<body>

<h1>Task Manager</h1>

<input type="text" id="taskInput" placeholder="Enter task name..." />
<input type="text" id="descriptionInput" placeholder="Enter task description..."/>

<button onclick="addTask()">Add Task</button>

<h2>Tasks</h2>
<ul id="taskList"></ul>

<script>
    const API_URL = "http://localhost:8080/tasks";

    window.onload = getTasks;

    function getTasks() {
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById("taskList");
                list.innerHTML = "";

                data.forEach(task => {
                    const li = document.createElement("li");

                    li.innerHTML = `
                         <strong>${task.title}</strong>
                         ${task.description}
                         <span style="color: ${task.completed ? 'green' : 'orange'}">
                         [${task.completed ? "Completed" : "Incomplete"}]
                         </span>
                         <button onclick="completeTask(${task.id})">Complete</button>
                         <button onclick="incompleteTask(${task.id})">Incomplete</button>
                         <button style="color: red" onclick="confirmDelete(${task.id})">Delete</button>
                        `;

                    list.appendChild(li);
                });
            });
    }

    function addTask() {
        const input = document.getElementById("taskInput");
        const descriptioninput = document.getElementById("descriptionInput");

        fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: input.value + ":",
                completed: false,
                description: descriptioninput.value
            })
        })
            .then(() => {
                input.value = "";
                descriptioninput.value = ""
                getTasks();
            });
    }

    function deleteTask(id){
        fetch(`${API_URL}/${id}`, {
            method: "DELETE"
        }).then(getTasks);
    }

    let ConfirmButtonVisible = false;

    function confirmDelete(id) {
        if (ConfirmButtonVisible){
            return;
        }

        const li = document.createElement("li");

        li.innerHTML = `
          <button onclick="deleteTask(${id})">Confirm</button>
        `

        document.body.appendChild(li);
        ConfirmButtonVisible = true
    }

    function completeTask(id) {
        fetch(`${API_URL}/${id}/complete`, {
            method: "PUT"
        }).then(getTasks);
    }

    function incompleteTask(id){
        fetch(`${API_URL}/${id}/incomplete`, {
            method: "PUT"
        }).then(getTasks)
    }
</script>

</body>
</html>
